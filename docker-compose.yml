version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: examedge_postgres
    environment:
      POSTGRES_USER: examedge_user
      POSTGRES_PASSWORD: examedge_local_password
      POSTGRES_DB: examedge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examedge_user -d examedge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: examedge_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment to run the API in Docker too (usually run locally in dev)
  # api:
  #   build: .
  #   container_name: examedge_api
  #   env_file: .env
  #   ports:
  #     - "3001:3001"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
